version: "3.9"

services:
  app:
    build: .
    ports:
      - "8501:8501"  # Streamlit UI
      - "8000:8000"  # FastAPI
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - DB_PATH=data/bid_agent.db
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
